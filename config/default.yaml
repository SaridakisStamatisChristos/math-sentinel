seed: 1337
device: auto
compile: false

model:
  seq_len: 192
  d_model: 64
  n_heads: 4
  n_layers: 1
  dropout: 0.1

verifier:
  hidden_size: 96
  dropout: 0.1
  n_heads: 4
  n_layers: 2
  max_seq_len: 192
  ff_mult: 4
  lr: 0.0006
  margin: 0.6
  rank_weight: 0.5
  focal_gamma: 2.0
  focal_alpha: 0.75
  loss_weight: 0.55
  mined_pairs_per_step: 4
  online_pairs_per_step: 2
  online_mining_start_step: 1
  online_beam_width: 6
  online_max_depth: 5
  online_proposal_count: 6
  online_temperature: 1.0
  online_top_k: 32

training:
  steps: 1000
  batch_size: 8
  micro_batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  eval_every: 100
  save_every: 50
  log_every: 10
  memory_refresh_samples: 32
  amp: true
  max_new_tokens: 64

search:
  beam_width: 8
  max_depth: 6
  proposal_count: 8
  temperature: 0.8
  top_k: 20

memory:
  replay_capacity: 5000
  hard_case_capacity: 2000
  lemma_store_path: memory/lemma_store.json
  hard_cases_path: memory/hard_cases.json
  tactic_stats_path: memory/tactic_stats.json
  replay_path: memory/replay.jsonl

paths:
  checkpoints_dir: checkpoints
  logs_dir: logs
  data_dir: data
