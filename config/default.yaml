seed: 1337
device: auto
compile: false

runtime:
  deterministic: false
  safe_mode: false
  structured_logs: true
  event_log_path: logs/runtime_events.jsonl
  fail_on_checkpoint_mismatch: false

model:
  provider: legacy_tiny
  backbone: Qwen/Qwen2.5-1.5B-Instruct
  adapter_mode: none
  quantization: none
  dtype: float32
  device_map: single
  trust_remote_code: false
  local_files_only: false
  special_tokens_version: 2
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: all-linear
  seq_len: 192
  d_model: 64
  n_heads: 4
  n_layers: 1
  dropout: 0.1

verifier:
  hidden_size: 96
  dropout: 0.1
  n_heads: 4
  n_layers: 2
  max_seq_len: 192
  ff_mult: 4
  lr: 0.0006
  margin: 0.6
  rank_weight: 0.5
  focal_gamma: 2.0
  focal_alpha: 0.75
  loss_weight: 0.55
  mined_pairs_per_step: 4
  online_pairs_per_step: 2
  online_pairs_by_phase:
    basics: 2
    number_theory: 3
    algebra: 4
    calculus: 4
  online_mining_start_step: 1
  online_beam_width: 6
  online_beam_width_by_phase:
    basics: 6
    number_theory: 7
    algebra: 8
    calculus: 8
  online_max_depth: 5
  online_max_depth_by_phase:
    basics: 5
    number_theory: 6
    algebra: 7
    calculus: 7
  online_proposal_count: 6
  online_proposal_count_by_phase:
    basics: 6
    number_theory: 7
    algebra: 8
    calculus: 8
  online_temperature: 1.0
  online_temperature_by_phase:
    basics: 1.0
    number_theory: 1.05
    algebra: 1.1
    calculus: 1.1
  online_top_k: 32
  online_top_k_by_phase:
    basics: 32
    number_theory: 36
    algebra: 40
    calculus: 40

training:
  steps: 1000
  batch_size: 8
  micro_batch_size: 4
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  eval_every: 100
  save_every: 50
  log_every: 10
  memory_refresh_samples: 32
  amp: true
  max_new_tokens: 64

search:
  mode: auto
  beam_width: 8
  max_depth: 6
  proposal_count: 8
  temperature: 0.8
  top_k: 20
  tactic_bonus: 0.12
  decoder_mode: hybrid
  mcts_simulations: 24
  mcts_branching: 8
  mcts_exploration: 1.25
  transposition_capacity: 8192
  value_weight: 0.35
  novelty_weight: 0.08
  prompt_compaction: true
  prompt_problem_chars: 720
  prompt_fact_limit: 4
  prompt_subgoal_limit: 3
  prompt_obligation_limit: 4
  prompt_evidence_limit: 4
  prompt_tool_limit: 3
  prompt_action_limit: 2
  prompt_file_limit: 5
  prompt_retrieval_item_limit: 2
  prompt_text_item_chars: 120

memory:
  replay_capacity: 5000
  hard_case_capacity: 2000
  retrieval_mode: hybrid
  embedding_model: hashing
  lemma_store_path: memory/lemma_store.json
  hard_cases_path: memory/hard_cases.json
  tactic_stats_path: memory/tactic_stats.json
  replay_path: memory/replay.jsonl

paths:
  checkpoints_dir: checkpoints
  logs_dir: logs
  data_dir: data

official_corpus:
  gaia:
    format: gaia
    input_path: data/official_corpus/gaia/records.jsonl
    fixtures_root: data/official_corpus/gaia/attachments
    manifest_path: benchmarks/manifests/gaia_full_official.json
    suite_name: gaia_full_official
    description: Full GAIA corpus imported from a local official export.
    tier: official
    default_profile: public_claim_no_repairs
    strict_materialization: true
  swebench:
    format: swebench
    input_path: data/official_corpus/swebench/records.jsonl
    fixtures_root: data/official_corpus/swebench/workspaces
    manifest_path: benchmarks/manifests/swebench_full_official.json
    suite_name: swebench_verified_full_official
    description: Full SWE-bench corpus imported from a local official export.
    tier: official
    default_profile: public_claim_coder_local_1p5b
    strict_materialization: true
