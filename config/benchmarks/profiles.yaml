profiles:
  public_unassisted_strict:
    description: Headline public-claim profile with strict unassisted benchmark rules and no guided fallback rollout.
    config: profile_public_unassisted_strict.yaml
    suites: [public_smoke, public_medium]
    tags: [public, strict, unassisted, claim]
    metadata:
      scale: tiny
      purpose: public_claim
  public_search_assisted:
    description: Development-only public benchmark profile that keeps guided fallback rollout enabled for search-assisted baselines.
    config: profile_public_search_assisted.yaml
    suites: [public_smoke, public_medium]
    tags: [public, dev, search_assisted]
    metadata:
      scale: tiny
      purpose: public_dev_baseline
  smoke_tiny:
    description: Deterministic legacy-tiny smoke profile for CI, fast regressions, and ablation sanity checks.
    config: profile_smoke_tiny.yaml
    suites: [public_smoke, internal]
    tags: [smoke, ci, deterministic]
    metadata:
      scale: tiny
      purpose: regression
  hf_tiny_local:
    description: Cached Hugging Face tiny-model profile for local open-weight smoke testing.
    config: profile_hf_tiny_local.yaml
    suites: [public_smoke]
    tags: [hf, smoke, local]
    metadata:
      scale: tiny
      purpose: runtime_smoke
  qwen_general_dev_1p5b:
    description: Development profile for general reasoning on the local open-weight runtime.
    config: profile_qwen_general_1p5b.yaml
    suites: [gaia_smoke, math_public_smoke]
    tags: [hf, qwen, dev, general]
    metadata:
      scale: 1.5b
      purpose: general_dev
  qwen_coder_dev_1p5b:
    description: Development profile for code-agent tasks with the coder-tuned backbone.
    config: profile_qwen_coder_1p5b.yaml
    suites: [swebench_verified_smoke]
    tags: [hf, qwen, dev, coder]
    metadata:
      scale: 1.5b
      purpose: coder_dev
  rtx4060_general_local:
    description: RTX 4060 laptop tuned local general-reasoning profile for Qwen 1.5B.
    config: profile_rtx4060_general_1p5b.yaml
    suites: [gaia_smoke, math_public_smoke]
    tags: [hf, qwen, local, rtx4060, general]
    metadata:
      scale: 1.5b
      purpose: local_4060_general
  rtx4060_coder_local:
    description: RTX 4060 laptop tuned local code-agent profile for Qwen Coder 1.5B.
    config: profile_rtx4060_coder_1p5b.yaml
    suites: [swebench_verified_smoke]
    tags: [hf, qwen, local, rtx4060, coder]
    metadata:
      scale: 1.5b
      purpose: local_4060_coder
  qwen_coder_benchmark_7b:
    description: Mid-scale benchmark profile for public code-agent runs when local iteration still matters.
    config: profile_qwen_coder_7b.yaml
    suites: [swebench_verified_smoke]
    tags: [hf, qwen, benchmark, coder]
