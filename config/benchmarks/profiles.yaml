      purpose: benchmark_midscale
  qwen_general_flagship_32b:
    description: Flagship general-reasoning benchmark profile for GAIA-style runs on strong local hardware.
    config: profile_qwen_general_32b.yaml
    suites: [gaia_smoke, math_public_smoke]
