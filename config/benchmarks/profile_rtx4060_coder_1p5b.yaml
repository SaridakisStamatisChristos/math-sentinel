extends: public_smoke.yaml

runtime:
  deterministic: true
  safe_mode: true

model:
  provider: hf_causal_lm
  backbone: models/Qwen2.5-Coder-1.5B-Instruct
  adapter_mode: none
  quantization: none
  dtype: float16
  device_map: single
  local_files_only: true

training:
  batch_size: 2
  micro_batch_size: 1
  max_new_tokens: 48

search:
  mode: beam
  beam_width: 8
  proposal_count: 8
  max_depth: 8
  mcts_simulations: 24
  mcts_branching: 8
  guided_rollout_depth: 8
  transposition_capacity: 8192
  fallback_bonus: 0.35
