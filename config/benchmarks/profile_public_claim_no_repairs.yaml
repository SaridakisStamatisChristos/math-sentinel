extends: profile_public_unassisted_strict.yaml

benchmark:
  report_lane: claim_no_repairs

model:
  provider: hf_causal_lm
  backbone: models/Qwen2.5-1.5B-Instruct
  adapter_mode: none
  quantization: none
  dtype: float16
  device_map: single
  local_files_only: true
  seq_len: 640

verifier:
  max_seq_len: 640

training:
  batch_size: 2
  micro_batch_size: 1
  max_new_tokens: 48

search:
  beam_width: 5
  proposal_count: 5
  max_depth: 6
  mcts_simulations: 16
  mcts_branching: 6
  guided_rollout_depth: 6
  transposition_capacity: 4096
